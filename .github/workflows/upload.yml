name: Daily YouTube Upload

on:
  schedule:
    - cron: '0 14 * * *'  # runs daily at 7am PT
  workflow_dispatch:       # lets you also trigger it manually

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation
          pip install google-api-python-client google-auth-oauthlib

      - name: Write token file
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: Run uploader
        run: python upload.py
